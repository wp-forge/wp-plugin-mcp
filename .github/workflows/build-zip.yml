name: Build Distribution Zip

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup workflow context
        id: workflow
        working-directory: ${{ runner.temp }}
        run: |
          mkdir dist
          echo "DIST=${PWD}/dist" >> "$GITHUB_OUTPUT"
          echo "PACKAGE=wp-plugin-mcp" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare files
        env:
          DIST: ${{ steps.workflow.outputs.DIST }}
        run: |
          mkdir -p "$DIST/wp-plugin-mcp"
          rsync -r --delete --exclude-from=.distignore ./ "$DIST/wp-plugin-mcp/"

      - name: List files
        working-directory: ${{ steps.workflow.outputs.DIST }}
        run: find .

      - name: Upload installable plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.workflow.outputs.PACKAGE }}
          path: ${{ steps.workflow.outputs.DIST }}
